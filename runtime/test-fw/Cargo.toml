[package]
name = "caliptra-runtime-test-bin"
version = "0.1.0"
edition = "2021"

[features]
std = []
runtime = ["caliptra-test-harness/runtime"]
riscv = [
    "caliptra-cpu/riscv",
    "caliptra-runtime/riscv",
    "caliptra-test-harness/riscv",
]
cfi = [
    "caliptra-drivers/cfi",
    "caliptra-runtime/cfi",
]
emu = [
    "caliptra-drivers/emu",
    "caliptra-runtime/emu",
    "caliptra-test-harness/emu",
]
fpga_realtime = ["caliptra-runtime/fpga_realtime"]
fpga_subsystem = ["caliptra-runtime/fpga_subsystem"]
rev-latest = ["caliptra-registers/rev-latest", "caliptra-cpu/rev-latest", "caliptra-drivers/rev-latest", "caliptra-runtime/rev-latest"]
rev-2_1 = ["caliptra-registers/rev-2_1", "caliptra-cpu/rev-2_1", "caliptra-drivers/rev-2_1", "caliptra-runtime/rev-2_1"]

[[bin]]
name = "boot"
path = "src/boot_tests.rs"
required-features = ["riscv"]

[[bin]]
name = "mbox"
path = "src/mbox_responder.rs"
required-features = ["riscv"]

[[bin]]
name = "persistent_rt"
path = "src/persistent_tests.rs"
required-features = ["riscv", "runtime"]

[[bin]]
name = "mock_rt_interact"
path = "src/mock_rt_test_interactive.rs"
required-features = ["riscv", "runtime"]


[build-dependencies]
caliptra-common = { workspace = true, default-features = false }
caliptra-gen-linker-scripts.workspace = true
cfg-if.workspace = true

[dependencies]
caliptra-common = { workspace = true, default-features = false }
caliptra-cpu.workspace = true
caliptra-drivers.workspace = true
caliptra-dpe.workspace = true
caliptra-registers.workspace = true
caliptra-runtime = { workspace = true, default-features = false }
caliptra-test-harness.workspace = true
cfg-if.workspace = true
ufmt.workspace = true
zerocopy.workspace = true
