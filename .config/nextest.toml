# TODO(#2369): Remove the extra filters after fixing the broken tests
#
# test(test_csrng_entropy_config_warm_reset): on the subsystem, MCU ROM owns
# SS_STRAP_GENERIC loading and locks the registers (CPTRA_FUSE_WR_DONE) before the
# host can inject the strap via soc_ifc, so single-bit entropy mode cannot be
# configured from the test harness. Re-enable once MCU ROM populates these straps.
[profile.fpga-subsystem]
default-filter = """
package(caliptra-runtime) & test(test_fips::test_fips_shutdown)
"""
failure-output = "immediate-final"
fail-fast = false
slow-timeout = { period = "30s", terminate-after = 6 }
retries = 3 # the fpga subsystem is a bit flaky with typically 1 test randomly failing out of 100-200

[[profile.fpga-subsystem.overrides]]
filter = 'test(test_binaries_are_identical)'
slow-timeout = { period = "30s", terminate-after = 30 }

[[profile.fpga-subsystem.overrides]]
filter = 'test(test_preamble_vendor_lms_pubkey_revocation)'
slow-timeout = { period = "30s", terminate-after = 10 }

[[profile.fpga-subsystem.overrides]]
filter = 'test(test_rt_journey_pcr_validation)'
slow-timeout = { period = "30s", terminate-after = 10 }

[[profile.fpga-subsystem.overrides]]
filter = 'test(test_populate_idev_ecc_cert_after_warm_reset)'
slow-timeout = { period = "30s", terminate-after = 10 }

[[profile.fpga-subsystem.overrides]]
filter = 'test(test_stress_update)'
slow-timeout = { period = "30s", terminate-after = 100 }

[[profile.fpga-subsystem.overrides]]
filter = 'test(test_pl0_pl1_reallocation_range)'
slow-timeout = { period = "30s", terminate-after = 100 }

[profile.fpga-subsystem.junit]
path = "/tmp/junit.xml"
store-success-output = true
store-failure-output = true

