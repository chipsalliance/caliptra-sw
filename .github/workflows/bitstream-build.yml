name: FPGA Bitstream build

on:
  pull_request:
    paths:
      - ".github/workflows/bitstream-build.yml"
      - "hw/**/*"

  workflow_dispatch:

jobs:
  build-bitstream:
    runs-on: [bitstream-builder]
    timeout-minutes: 1440 
    strategy:
      matrix:
        segmented: [true, false]
    steps:
      - name: Checkout repo
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd #v6.0.2
        with:
          submodules: 'recursive'

      - name: Create Core bitstream
        run: |
          source /vck190-tools/Vivado/2024.2/settings64.sh
          cd hw/fpga/
          /vck190-tools/Vivado/2024.2/bin/vivado -mode batch -source fpga_configuration.tcl -tclargs BUILD=TRUE SEGMENTED=${{ matrix.segmented }}
          cp caliptra_build/*.xsa /tmp/ || true
          cp caliptra_build/*.pdi /tmp/ || true

      - name: 'Upload bitstream'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a #v7.0.1
        with:
          name: caliptra-bitstream-${{ matrix.segmented }}
          path: |
            /tmp/*.xsa
            /tmp/*.pdi
          retention-days: 7

      - name: Bundle bitstream
        run: |
          SEGMENTED_ARG=""
          if [ "${{ matrix.segmented }}" = "true" ]; then
            SEGMENTED_ARG="--segmented"
          fi
          
          # Find the xsa and pdi files in /tmp
          XSA_FILE=$(ls /tmp/*.xsa 2>/dev/null | head -n 1)
          PDI_FILE=$(ls /tmp/*.pdi 2>/dev/null | head -n 1)

          PDI_ARG=""
          if [ -n "$PDI_FILE" ]; then
            PDI_ARG="--pdi-file $PDI_FILE"
          fi

          # Leave a copy for the uploader
          mkdir manifest-bundle
          
          caliptra-bitstream-downloader bundle-manifest \
            --repository "${{ github.repository }}" \
            --hw-major-version "2.1" \
            --target-branch "${{ github.base_ref || github.ref_name }}" \
            --caliptra-variant "subsystem" \
            --commit-hash "${{ github.sha }}" \
            --job-id "${{ github.run_id }}-${{ github.job }}" \
            $SEGMENTED_ARG \
            ${{ github.event.pull_request.number && format('--github-pr {0}', github.event.pull_request.number) || '' }} \
            --xsa-file "$XSA_FILE" \
            $PDI_ARG \
            --output-dir manifest-bundle

          cp manifest-bundle/caliptra-bitstream.tar.gz /tmp

      - name: 'Upload bitstream bundle'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a #v7.0.1
        with:
          name: caliptra-bitstream-bundle-${{ matrix.segmented && 'segmented' || 'standard' }}
          path: /tmp/caliptra-bitstream.tar.gz
          retention-days: 7
